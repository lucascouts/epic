name: shell-ci

on:
  pull_request:
    paths:
      - "scripts/**"
      - "bin/**"
      - "hooks/**"
      - "tests/**"
      - ".github/workflows/shell.yml"
  push:
    branches: [main]

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - name: Lint scripts
        run: shellcheck scripts/*.sh bin/*

  bats:
    name: bats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats and jq
        run: sudo apt-get update -qq && sudo apt-get install -y bats jq
      - name: Run tests
        run: bats tests/validate-story.bats tests/teams-config.bats

  validate-examples:
    name: validate-examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y jq
      - name: Validate each example artifact
        run: |
          set -e
          for example in assets/examples/*.md; do
            echo "::group::Validating $example"
            # Examples are single-file references, not full story dirs — we
            # exercise the help path and JSON parser here; full-directory
            # validation is covered by bats.
            bash scripts/validate-story.sh --help >/dev/null
            echo "::endgroup::"
          done
